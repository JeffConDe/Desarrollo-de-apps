<div *ngIf="job" class="max-w-3xl mx-auto bg-zinc-800 p-8 rounded-xl shadow-xl">

  <h2 class="text-3xl text-white font-bold mb-4">
    {{job.title}}
  </h2>

  <p class="text-zinc-300 mb-1">
    <span class="font-semibold">Empresa:</span> {{job.company}}
  </p>

  <p class="text-zinc-300 mb-1">
    <span class="font-semibold">Ubicación:</span> {{job.location}}
  </p>

  <p class="text-green-400 font-bold mb-4">
    {{job.salary}}
  </p>

  <p class="text-zinc-200 leading-relaxed mb-6">
    {{job.description}}
  </p>

  <div class="flex gap-4">

    <button class="bg-green-600 hover:bg-green-700 px-6 py-2 rounded-lg text-white transition">
      Aplicar
    </button>

    <button class="bg-yellow-500 hover:bg-yellow-600 px-6 py-2 rounded-lg text-white transition">
      Guardar
    </button>

  </div>

</div>
